name: Reusable Semantic Release

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version for semantic-release
        required: false
        type: string
        default: "3.12"
      release_branch:
        description: Branch semantic-release should push to
        required: false
        type: string
        default: main
      semantic_release_requirement:
        description: Requirement specifier passed to pip install for python-semantic-release
        required: false
        type: string
        default: "python-semantic-release~=10.0"
      working_directory:
        description: Directory containing semantic-release configuration (for monorepos)
        required: false
        type: string
        default: "."
      push_changes:
        description: Whether semantic-release should push release commits/tags to remote
        required: false
        type: boolean
        default: true
      run_publish:
        description: Whether to run semantic-release publish after version
        required: false
        type: boolean
        default: true
    secrets:
      anthusbot_gh_token:
        required: true
      semantic_release_pypi_token:
        required: false
    outputs:
      released:
        description: Whether semantic-release created a new tag/version
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: New tag created by semantic-release (if any)
        value: ${{ jobs.release.outputs.tag }}
      version:
        description: New version without v-prefix (if any)
        value: ${{ jobs.release.outputs.version }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semrel_version.outputs.released }}
      tag: ${{ steps.semrel_version.outputs.tag }}
      version: ${{ steps.semrel_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.anthusbot_gh_token }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Ensure release branch checkout
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$RELEASE_BRANCH"
          git checkout -B "$RELEASE_BRANCH" "origin/$RELEASE_BRANCH"

      - name: Install semantic-release
        env:
          SEMANTIC_RELEASE_REQUIREMENT: ${{ inputs.semantic_release_requirement }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${SEMANTIC_RELEASE_REQUIREMENT}" build

      - name: Configure bot git identity and auth for release push
        env:
          ANTHUSBOT_GH_TOKEN: ${{ secrets.anthusbot_gh_token }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHUSBOT_GH_TOKEN}" ]; then
            echo "Missing secret: anthusbot_gh_token" >&2
            exit 1
          fi
          git config user.name "anthusbot"
          git config user.email "anthusbot@users.noreply.github.com"
          # Ensure git never prefers a checkout-provided header tied to github-actions[bot].
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${ANTHUSBOT_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url --push origin "https://x-access-token:${ANTHUSBOT_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Semantic Release (version)
        id: semrel_version
        working-directory: ${{ inputs.working_directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.anthusbot_gh_token }}
          GH_TOKEN: ${{ secrets.anthusbot_gh_token }}
          PYPI_TOKEN: ${{ secrets.semantic_release_pypi_token }}
          PUSH_CHANGES: ${{ inputs.push_changes }}
        run: |
          set -euo pipefail

          before_tags="$(git tag | sort || true)"
          if [ "${PUSH_CHANGES}" = "true" ]; then
            semantic-release version
          else
            semantic-release version --no-push --no-vcs-release
          fi
          after_tags="$(git tag | sort || true)"

          new_tag="$(
            comm -13 \
              <(printf '%s\n' "$before_tags" | sed '/^$/d') \
              <(printf '%s\n' "$after_tags" | sed '/^$/d') \
            | tail -n1
          )"

          if [ -n "$new_tag" ]; then
            version_without_prefix="${new_tag#${new_tag%%[0-9]*}}"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
            echo "version=${version_without_prefix}" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Semantic Release (publish)
        if: ${{ inputs.run_publish && inputs.push_changes && steps.semrel_version.outputs.released == 'true' }}
        working-directory: ${{ inputs.working_directory }}
        env:
          GITHUB_TOKEN: ${{ secrets.anthusbot_gh_token }}
          GH_TOKEN: ${{ secrets.anthusbot_gh_token }}
          PYPI_TOKEN: ${{ secrets.semantic_release_pypi_token }}
        run: semantic-release publish

      - name: Warn when PyPI token is missing
        if: ${{ inputs.run_publish && inputs.push_changes && steps.semrel_version.outputs.released == 'true' && secrets.semantic_release_pypi_token == '' }}
        run: |
          echo "::warning::semantic_release_pypi_token is empty; skipping explicit PyPI upload."

      - name: Publish built artifacts to PyPI (twine)
        if: ${{ inputs.run_publish && inputs.push_changes && steps.semrel_version.outputs.released == 'true' && secrets.semantic_release_pypi_token != '' }}
        working-directory: ${{ inputs.working_directory }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.semantic_release_pypi_token }}
        run: |
          set -euo pipefail
          python -m pip install twine
          if ! compgen -G "dist/*" > /dev/null; then
            echo "Expected build artifacts under dist/, but none were found." >&2
            exit 1
          fi
          python -m twine upload --skip-existing dist/*
