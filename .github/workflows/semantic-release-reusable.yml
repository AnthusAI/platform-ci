name: Reusable Semantic Release

on:
  workflow_call:
    inputs:
      python_version:
        description: Python version for semantic-release
        required: false
        type: string
        default: "3.12"
      checkout_ref:
        description: Optional ref/SHA to checkout before running semantic-release
        required: false
        type: string
        default: ""
      release_branch:
        description: Branch semantic-release should push to
        required: false
        type: string
        default: main
      install_command:
        description: Command used to install python-semantic-release
        required: false
        type: string
        default: 'pip install "python-semantic-release~=10.0"'
      run_publish:
        description: Whether to run semantic-release publish after version
        required: false
        type: boolean
        default: true
    secrets:
      anthusbot_gh_token:
        required: true
      semantic_release_pypi_token:
        required: false
    outputs:
      released:
        description: Whether semantic-release created a new tag/version
        value: ${{ jobs.release.outputs.released }}
      tag:
        description: New tag created by semantic-release (if any)
        value: ${{ jobs.release.outputs.tag }}
      version:
        description: New version without v-prefix (if any)
        value: ${{ jobs.release.outputs.version }}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.semrel_version.outputs.released }}
      tag: ${{ steps.semrel_version.outputs.tag }}
      version: ${{ steps.semrel_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.anthusbot_gh_token }}
          persist-credentials: true
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip

      - name: Ensure release branch checkout
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
          CHECKOUT_REF: ${{ inputs.checkout_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$RELEASE_BRANCH"
          if [ -n "$CHECKOUT_REF" ]; then
            git checkout -B "$RELEASE_BRANCH" "$CHECKOUT_REF"
          else
            git checkout -B "$RELEASE_BRANCH" "origin/$RELEASE_BRANCH"
          fi

      - name: Install semantic-release
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.install_command }}

      - name: Configure bot git identity and auth for release push
        env:
          ANTHUSBOT_GH_TOKEN: ${{ secrets.anthusbot_gh_token }}
        run: |
          set -euo pipefail
          if [ -z "${ANTHUSBOT_GH_TOKEN}" ]; then
            echo "Missing secret: anthusbot_gh_token" >&2
            exit 1
          fi
          git config user.name "anthusbot"
          git config user.email "anthusbot@users.noreply.github.com"
          # Ensure git never prefers a checkout-provided header tied to github-actions[bot].
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${ANTHUSBOT_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote set-url --push origin "https://x-access-token:${ANTHUSBOT_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Semantic Release (version)
        id: semrel_version
        env:
          GITHUB_TOKEN: ${{ secrets.anthusbot_gh_token }}
          GH_TOKEN: ${{ secrets.anthusbot_gh_token }}
          PYPI_TOKEN: ${{ secrets.semantic_release_pypi_token }}
        run: |
          set -euo pipefail

          before_tags="$(git tag | sort || true)"
          semantic-release version
          after_tags="$(git tag | sort || true)"

          new_tag="$(
            comm -13 \
              <(printf '%s\n' "$before_tags" | sed '/^$/d') \
              <(printf '%s\n' "$after_tags" | sed '/^$/d') \
            | tail -n1
          )"

          if [ -n "$new_tag" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
            echo "version=${new_tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Semantic Release (publish)
        if: ${{ inputs.run_publish && steps.semrel_version.outputs.released == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.anthusbot_gh_token }}
          GH_TOKEN: ${{ secrets.anthusbot_gh_token }}
          PYPI_TOKEN: ${{ secrets.semantic_release_pypi_token }}
        run: semantic-release publish
