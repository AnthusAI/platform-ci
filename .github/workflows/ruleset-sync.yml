name: Ruleset Sync

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/github-rulesets/**'
      - '.github/workflows/ruleset-sync.yml'
      - '.github/workflows/ruleset-sync-reusable.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: check
        type: choice
        options:
          - check
          - apply

permissions:
  contents: read

jobs:
  check:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'check') }}
    uses: ./.github/workflows/ruleset-sync-reusable.yml
    with:
      mode: check
      ruleset_glob: infra/github-rulesets/*.json
    secrets:
      ruleset_admin_token: ${{ secrets.RULESET_ADMIN_TOKEN }}

  apply:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'apply' }}
    uses: ./.github/workflows/ruleset-sync-reusable.yml
    with:
      mode: apply
      ruleset_glob: infra/github-rulesets/*.json
    secrets:
      ruleset_admin_token: ${{ secrets.RULESET_ADMIN_TOKEN }}
